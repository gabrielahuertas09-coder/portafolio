<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio - Diseñadora Gráfica</title>
    <link rel="stylesheet" href="index.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
</head>

<body id="inicio">

    <div class="layout-wrapper">
        <!-- Columna Izquierda: Información Personal y Foto -->
        <aside class="personal-info">

            <!-- Botones de navegación en fila -->
            <nav class="portada-nav">
                <a href="sobre_mi.html" class="nav-btn">Sobre Mí</a>
                <a href="proyectos.html" class="nav-btn">Proyectos</a>
                <a href="servicios.html" class="nav-btn">Servicios</a>
                <a href="contacto.html" class="nav-btn">Contacto</a>
            </nav>

            <div class="presentation-wrapper">
                <div class="name-box">
                    <h1 class="name">Gabriela Amaya</h1>
                </div>

                <div class="photo-placeholder">
                    <!-- Espacio para la fotografía -->
                    <span><img class="img" src="imagenes/foto.jpeg" alt="foto de perfil"></span>
                </div>

                <div class="role-box">
                    <h2 class="role">Diseñadora Gráfica</h2>
                </div>

                <div class="slogan-box">
                    <p class="slogan-text">"Diseño, Arte y Creatividad"</p>
                </div>
            </div>

            <!-- Información de contacto en portada -->
            <div class="contact-box">
                <a href="mailto:gabrielahuertas09@gmail.com" class="nav-btn"
                    style="display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.55rem; padding: 0.6rem 0.8rem;">gabrielahuertas09@gmail.com
                    <img class="icon" src="iconos/correo.png" alt="correo-electronico"
                        style="width: 20px; height: 20px;"></a>
                <a href="https://instagram.com/gabiamaya28" target="_blank" class="nav-btn"
                    style="display: inline-flex; align-items: center; gap: 0.4rem; text-transform: lowercase; font-size: 0.65rem; padding: 0.6rem 0.8rem;">@gabiamaya28
                    <img class="icon" src="iconos/logotipo-de-instagram.png" alt="logotipo-de-instagram"
                        style="width: 20px; height: 20px;"></a>
                <a href="tel:+573003040946" class="nav-btn"
                    style="display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.65rem; padding: 0.6rem 0.8rem;">+57
                    300 304 0946
                    <img class="icon" src="iconos/telefono.png" alt="telefono" style="width: 20px; height: 20px;"></a>
            </div>

        </aside>

        <!-- Columna Derecha: Ilustración Javascript -->
        <main class="illustration-container" style="position: relative;">
            <!-- Marco decorativo -->
            <div class="illustration-frame"></div>
            <div class="js-illustration-wrapper" id="canvas-container"
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;">
                <canvas id="hero-canvas"></canvas>
            </div>
            <img src="imagenes/ilustracion.png" alt="Ilustración Interactiva" class="ilustracion">
        </main>
    </div>


    <!-- Script de ejemplo para la ilustración -->
    <script src="script.js"></script>
</body>

</html>
